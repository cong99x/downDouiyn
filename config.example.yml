#######################################
# Douyin Downloader Configuration Example (Simple Version)
# Contains only the most common options, works with default settings
#######################################

# Supports multiple links (video, photo series, or user homepage for batch download)
link:
  - https://v.douyin.com/EXAMPLE1/
  - https://www.douyin.com/video/1234567890123456789

# Save directory
path: ./Downloaded/

# Download options (optional, all default to true)
music: true   # Download music
cover: true   # Download cover
json: true    # Save metadata JSON

# Time filtering (optional, leave empty for no filtering). Format: YYYY-MM-DD
start_time: ""
end_time: ""

# Cookie Configuration (Choose one of the three, in order of priority)
# 1) Auto-acquire (Requires Playwright: pip install playwright && playwright install)
cookies: auto

# 2) Directly paste the entire Cookie string (Example, comment out cookies: auto when using)
# cookies: "msToken=YOUR_MS_TOKEN; ttwid=YOUR_TTWID; odin_tt=YOUR_ODIN_TT; ...;"

# 3) Provide as key-value pairs (Example, comment out the above cookies when using)
# cookies:
#   msToken: YOUR_MS_TOKEN
#   ttwid: YOUR_TTWID
#   odin_tt: YOUR_ODIN_TT
#   passport_csrf_token: YOUR_PASSPORT_CSRF_TOKEN
#   sid_guard: YOUR_SID_GUARD

# Homepage download mode (Only effective when link is a user homepage, options: post/like; default: post)
# mode:
#   - post

# AWS S3 Configuration (Optional)
# If enabled, downloaded files will be automatically uploaded to the specified S3 bucket
aws:
  enabled: false
  access_key_id: "YOUR_AWS_ACCESS_KEY_ID"
  secret_access_key: "YOUR_AWS_SECRET_ACCESS_KEY"
  region: "us-east-1"
  bucket_name: "your-bucket-name"
  prefix: "douyin-downloads" # Optional folder prefix in S3 bucket
  endpoint_url: "" # Optional: Custom endpoint URL for S3-compatible storage (e.g., MinIO: http://localhost:9000)

version: '3.8'

services:
  # MinIO Object Storage
  minio:
    image: minio/minio
    container_name: douyin_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app_network

  # Python Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: douyin_backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      # Mount config file from host
      - ./config.yml:/app/config.yml
      # Mount Downloaded folder (optional, if you want to inspect locally before auto-delete)
      - ./Downloaded:/app/Downloaded
      # Persistent database
      - ./data.db:/app/data.db
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - minio
    networks:
      - app_network

  # Vue Frontend (hosted by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: douyin_frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  minio_data:
